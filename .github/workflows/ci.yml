name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Swift version
        run: swift --version
      - name: Test
        run: ./Scripts/test.sh
      - name: Build app executable
        run: swift build -c release --product AgentsStatusBar
      - name: Package ad-hoc app for validation
        run: ./Scripts/package_app.sh
